name: Build (Windows x64)

on:
  push:
    tags: [ "v*" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT: OppoPodsManager.csproj
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: single-file
            pack: exe
            args: "--self-contained false -p:PublishSingleFile=true -p:PublishAot=false -p:IncludeNativeLibrariesForSelfExtract=true"

          - variant: self-contained
            pack: exe
            args: "--self-contained true -p:PublishSingleFile=true -p:PublishAot=false -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=false -p:PublishTrimmed=true"

          - variant: aot
            pack: zip
            args: "-p:PublishAot=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish (${{ matrix.variant }})
        shell: pwsh
        run: >
          dotnet publish $env:PROJECT
          -c Release
          -r win-x64
          -o "publish/${{ matrix.variant }}"
          ${{ matrix.args }}

  
      - name: Package (${{ matrix.variant }})
        id: package
        shell: pwsh
        run: |
          $dir = "publish/${{ matrix.variant }}"

          if ("${{ matrix.pack }}" -eq "zip") {
            $out = "OppoPodsManager-${{ matrix.variant }}-win-x64.zip"
            Compress-Archive -Path "$dir/*" -DestinationPath $out -Force
          } else {
            $out = "OppoPodsManager-${{ matrix.variant }}-win-x64.exe"
            $exe = Get-ChildItem -Path $dir -Filter "OppoPodsManager.exe" -Recurse | Select-Object -First 1
            Copy-Item $exe.FullName -Destination $out -Force
          }

          echo "asset=$out" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: OppoPodsManager-${{ matrix.variant }}-win-x64
          path: ${{ steps.package.outputs.asset }}
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ### 下载说明

            | 版本 | 说明 |
            |---|---|
            | **普通版 exe（single-file）** | 需安装 .NET 运行时 |
            | **自包含版 exe（self-contained）** | 免安装 |
            | **AOT 版 zip（aot）** | 原生编译性能最佳 |
