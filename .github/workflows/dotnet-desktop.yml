name: Build (Windows + Linux)

on:
  push:
    tags: [ "v*" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: write

env:
  PROJECT: OppoPodsManager.csproj
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──
          - os: ubuntu-latest
            rid: linux-x64
            backend: false
            target: net10.0
            variant: single-file
            publish-args: "--self-contained false -p:PublishSingleFile=true -p:PublishAot=false"
            pack: tar.gz
          - os: ubuntu-latest
            rid: linux-x64
            backend: false
            target: net10.0
            variant: self-contained
            publish-args: "--self-contained true -p:PublishSingleFile=true -p:PublishAot=false -p:EnableCompressionInSingleFile=false -p:PublishTrimmed=true"
            pack: tar.gz

          # ── Windows ──
          - os: windows-latest
            rid: win-x64
            backend: true
            target: net10.0-windows10.0.19041.0
            variant: single-file
            publish-args: "--self-contained false -p:PublishSingleFile=true -p:PublishAot=false -p:IncludeNativeLibrariesForSelfExtract=true"
            pack: exe
          - os: windows-latest
            rid: win-x64
            backend: true
            target: net10.0-windows10.0.19041.0
            variant: self-contained
            publish-args: "--self-contained true -p:PublishSingleFile=true -p:PublishAot=false -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=false -p:PublishTrimmed=true"
            pack: exe
          - os: windows-latest
            rid: win-x64
            backend: true
            target: net10.0-windows10.0.19041.0
            variant: aot
            publish-args: "-p:PublishAot=true"
            pack: zip

          # ── Windows ARM64 ──
          - os: windows-latest
            rid: win-arm64
            backend: true
            target: net10.0-windows10.0.19041.0
            variant: single-file
            publish-args: "--self-contained false -p:PublishSingleFile=true -p:PublishAot=false -p:IncludeNativeLibrariesForSelfExtract=true"
            pack: exe
          - os: windows-latest
            rid: win-arm64
            backend: true
            target: net10.0-windows10.0.19041.0
            variant: self-contained
            publish-args: "--self-contained true -p:PublishSingleFile=true -p:PublishAot=false -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=false -p:PublishTrimmed=true"
            pack: exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish (${{ matrix.os }} / ${{ matrix.variant }})
        shell: pwsh
        run: >
          dotnet publish $env:PROJECT
          -c Release
          -r ${{ matrix.rid }}
          -f ${{ matrix.target }}
          -o "publish/${{ matrix.variant }}"
          ${{ matrix.publish-args }}
          -p:EnableWindowsBackend=${{ matrix.backend }}

      - name: Package (${{ matrix.os }} / ${{ matrix.variant }})
        id: package
        shell: pwsh
        run: |
          $dir = "publish/${{ matrix.variant }}"
          $prefix = "OppoPodsManager-${{ matrix.variant }}-${{ matrix.rid }}"

          if ("${{ matrix.pack }}" -eq "zip") {
            $out = "$prefix.zip"
            Compress-Archive -Path "$dir/*" -DestinationPath $out -Force
          } elseif ("${{ matrix.pack }}" -eq "tar.gz") {
            $tar = "$prefix.tar"
            if ($IsWindows) {
              7z a -ttar $tar "$dir/*"
              7z a -tgzip "$prefix.tar.gz" $tar
              Remove-Item $tar
            } else {
              tar -czf "$prefix.tar.gz" -C $dir .
            }
            $out = "$prefix.tar.gz"
          } else {
            $out = "$prefix.exe"
            $exe = Get-ChildItem -Path $dir -Filter "OppoPodsManager*" -Recurse |
                   Where-Object { $_.Extension -in '.exe', '' } |
                   Select-Object -First 1
            Copy-Item $exe.FullName -Destination $out -Force
          }

          "asset=$out" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: OppoPodsManager-${{ matrix.variant }}-${{ matrix.rid }}
          path: ${{ steps.package.outputs.asset }}
          retention-days: 14

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
