name: Require logs for bug reports

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  require-logs:
    name: Check required log attachment
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'bug')
    steps:
      - name: Check issue log attachment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            const logSectionMatch = body.match(/### 日志文件（必须上传）([\s\S]*?)(?:\n### |$)/);
            const logSection = logSectionMatch ? logSectionMatch[1].trim() : '';

            const hasAttachment = /https:\/\/(?:github\.com\/user-attachments\/files\/|user-images\.githubusercontent\.com\/|private-user-images\.githubusercontent\.com\/)/i.test(logSection);

            if (hasAttachment) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'missing logs'
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              if (issue.state === 'closed') {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'open'
                });
              }
              return;
            }

            const marker = '<!-- require-logs-bot -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100
            });
            const alreadyCommented = comments.some(comment => comment.body && comment.body.includes(marker));

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['missing logs']
              });
            } catch (error) {
              core.warning(`Failed to add missing logs label: ${error.message}`);
            }

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `${marker}\n这个 Issue 没有检测到日志附件，因此已自动关闭。\n\n请在“日志文件（必须上传）”区域上传软件导出的日志压缩包，然后重新打开 Issue。\n\n获取方式：软件内进入“设置” → “查看日志” → 导出日志，然后把导出的日志压缩包拖拽到日志输入框中。`
              });
            }

            if (issue.state !== 'closed') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });
            }
