name: 问题反馈

description: 反馈 OPPO Pods Manager 使用过程中遇到的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题。为了方便定位，请务必完整填写下面的信息。

        提交前请确认：
        - 已经使用最新版本的软件复现过问题。
        - 已经上传日志附件。
        - 不要删除任何必填项。

  - type: input
    id: os-version
    attributes:
      label: 系统版本号
      description: 请填写完整系统版本，例如 Windows 11 24H2 26100.4351、Windows 10 22H2 19045.x、Ubuntu 24.04 等。
      placeholder: Windows 11 24H2 26100.4351
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: 软件版本号
      description: 请填写 OPPO Pods Manager 的版本号。可在“关于”页面查看。
      placeholder: v1.1.4
    validations:
      required: true

  - type: input
    id: device-model
    attributes:
      label: 设备型号
      description: 请填写耳机/设备型号，例如 OPPO Enco X3、OnePlus Buds Pro 3 等。
      placeholder: OPPO Enco X3
    validations:
      required: true

  - type: dropdown
    id: install-type
    attributes:
      label: 使用的安装包类型
      description: 如果不确定，请选择“不确定”。
      options:
        - Windows x64 AOT
        - Windows x64 单文件
        - Windows arm64
        - Linux
        - 自行编译
        - 不确定
    validations:
      required: true

  - type: textarea
    id: problem-description
    attributes:
      label: 问题描述
      description: 请清楚描述你遇到的问题、实际表现和期望表现。
      placeholder: |
        例如：连接耳机后电量不显示；期望能正常显示左右耳和耳机仓电量。
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 复现步骤
      description: 请按步骤写出如何复现问题。
      placeholder: |
        1. 打开软件
        2. 连接耳机
        3. 点击……
        4. 出现……
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志文件（必须上传）
      description: |
        请上传软件导出的日志压缩包。仅填写文字说明不会通过自动检查。

        获取方式：软件内进入“设置” → “查看日志” → 导出日志，然后把导出的日志压缩包拖拽到这个输入框中，等待 GitHub 生成附件链接后再提交。

        注意：如果没有检测到日志附件链接，Issue 会被自动关闭。
      placeholder: 请将导出的日志压缩包拖拽到这里，等待 GitHub 生成附件链接。
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图或录屏（可选）
      description: 如果是界面显示问题，请上传截图或录屏。
      placeholder: 可以将图片或视频直接拖拽到这里。
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已经填写系统版本号、软件版本号和设备型号。
          required: true
        - label: 我已经上传日志附件。
          required: true
        - label: 我确认这个问题可以在当前版本复现。
          required: true
